<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Status Tracker</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    #stars {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: 0;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 10px;
        background: white;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from { transform: translateY(-100px); }
        to { transform: translateY(100vh); }
    }

    .content {
        position: relative;
        z-index: 1;
    }

    h1 { font-size: 34px; margin: 15px 0; }
    .label { opacity: 0.7; font-size: 14px; }
    .timer { font-size: 22px; margin-bottom: 20px; }
    .section { margin-top: 35px; }

    button {
        padding: 12px 25px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    .yes { background: green; }
    .no { background: red; }

    #popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        padding: 25px;
        border-radius: 10px;
        display: none;
    }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">

    <!-- 🔥 DOCUMENT COLLECTION -->
    <h1>DOCUMENT COLLECTION</h1>
    <div class="label">in progress:</div>
    <div id="docTimer" class="timer"></div>

    <!-- КНОПКИ -->
    <div>
        <button class="yes" onclick="showPopup('ha ha nice joke')">Yes</button>
        <button class="no" onclick="showPopup(')')">No</button>
    </div>

    <!-- 📉 OFFER (перенесен вниз и зафиксирован) -->
    <div class="section">
        <h1>HAVE I RECEIVED AN OFFER?</h1>
        <div class="label">waiting for:</div>
        <div id="offerTimer" class="timer"></div>
    </div>

    <!-- 📦 GUIDE -->
    <div class="section">
        <h1>HAVE I RECEIVED A GUIDE?</h1>
        <div class="label">it took only:</div>
        <div id="guideTimer" class="timer"></div>
    </div>

</div>

<div id="popup">
    <div id="popup-text"></div>
    <button onclick="closePopup()">Close</button>
</div>

<script>
    // ⭐ Stars
    setInterval(() => {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.getElementById("stars").appendChild(star);
        setTimeout(() => star.remove(), 5000);
    }, 100);

    // 📉 OFFER TIMER (фиксированный)
    const offerStart = new Date("2026-03-27T01:20:00+03:00");
    const offerEnd = new Date("2026-04-21T00:07:00+03:00");
    const offerDiff = offerEnd - offerStart;

    function renderDiff(diff, el) {
        const s = Math.floor(diff / 1000) % 60;
        const m = Math.floor(diff / 60000) % 60;
        const h = Math.floor(diff / 3600000) % 24;
        const d = Math.floor(diff / 86400000);
        document.getElementById(el).innerText =
            `${d}d ${h}h ${m}m ${s}s`;
    }

    renderDiff(offerDiff, "offerTimer");

    // 📦 GUIDE (фиксированный)
    const guideStart = new Date("2026-04-04T02:22:00");
    const guideEnd = new Date("2026-04-14T21:35:00");
    renderDiff(guideEnd - guideStart, "guideTimer");

    // 🔥 DOCUMENT COLLECTION (живой таймер)
    const docStart = offerEnd;

    function updateDocTimer() {
        const now = new Date();
        const diff = now - docStart;
        renderDiff(diff, "docTimer");
    }

    setInterval(updateDocTimer, 1000);
    updateDocTimer();

    // popup
    function showPopup(t) {
        document.getElementById("popup-text").innerText = t;
        document.getElementById("popup").style.display = "block";
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    // secret code
    let buffer = "";
    document.addEventListener("keydown", (e) => {
        buffer += e.key.toLowerCase();
        buffer = buffer.slice(-10);
        if (buffer.includes("offer")) {
            showPopup("FINALLY");
            buffer = "";
        }
    });
</script>

</body>
</html>
