<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Have I Receive the Offer?</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    #stars {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 10px;
        background: white;
        opacity: 0.8;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from {
            transform: translateY(-100px);
        }
        to {
            transform: translateY(100vh);
        }
    }

    .content {
        position: relative;
        z-index: 1;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 20px;
    }

    #timer {
        font-size: 24px;
        margin-bottom: 40px;
    }

    .buttons button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
    }

    .yes {
        background: green;
        color: white;
    }

    .no {
        background: red;
        color: white;
    }

    /* Popup */
    #popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        padding: 30px;
        border-radius: 10px;
        display: none;
        z-index: 2;
    }

    #popup button {
        margin-top: 10px;
        padding: 5px 15px;
    }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">
    <h1>HAVE I RECEIVE THE OFFER?</h1>
    <div id="timer"></div>

    <div class="buttons">
        <button class="yes" onclick="showPopup('ha ha nice joke')">Yes</button>
        <button class="no" onclick="showPopup(')')">No</button>
    </div>
</div>

<div id="popup">
    <div id="popup-text"></div>
    <button onclick="closePopup()">Close</button>
</div>

<script>
    // ⭐ Stars
    const starsContainer = document.getElementById("stars");

    function createStar() {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = (Math.random() * 3 + 2) + "s";
        starsContainer.appendChild(star);

        setTimeout(() => {
            star.remove();
        }, 5000);
    }

    setInterval(createStar, 100);

    // ⏱ Timer
    const startDate = new Date("2026-03-27T01:20:00+03:00");

    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;

        const seconds = Math.floor(diff / 1000) % 60;
        const minutes = Math.floor(diff / 1000 / 60) % 60;
        const hours = Math.floor(diff / 1000 / 60 / 60) % 24;
        const days = Math.floor(diff / 1000 / 60 / 60 / 24);

        document.getElementById("timer").innerText =
            `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    // 🔥 Popup
    function showPopup(text) {
        document.getElementById("popup-text").innerText = text;
        document.getElementById("popup").style.display = "block";
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    // 🎯 Secret code: "offer"
    let buffer = "";

    document.addEventListener("keydown", (e) => {
        buffer += e.key.toLowerCase();

        // оставляем только последние 10 символов
        buffer = buffer.slice(-10);

        if (buffer.includes("offer")) {
            showPopup("FINALLY");
            buffer = ""; // сброс
        }
    });
</script>

</body>
</html>
