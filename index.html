<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Have I Received the Offer?</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    #stars {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 10px;
        background: white;
        opacity: 0.8;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from { transform: translateY(-100px); }
        to { transform: translateY(100vh); }
    }

    .content {
        position: relative;
        z-index: 1;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 20px;
    }

    .sub {
        margin-top: 40px;
        font-size: 28px;
    }

    .label {
        font-size: 16px;
        opacity: 0.7;
        margin-top: 10px;
    }

    .timer {
        font-size: 22px;
        margin-bottom: 20px;
    }

    .buttons button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    #popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        padding: 30px;
        border-radius: 10px;
        display: none;
        z-index: 2;
    }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">
    <h1>HAVE I RECEIVED THE OFFER?</h1>

    <div class="label">waiting for:</div>
    <div id="timer1" class="timer"></div>

    <!-- Второй блок -->
    <div class="sub">HAVE I RECEIVED A GUIDE?</div>
    <div class="label">it took only:</div>
    <div id="timer2" class="timer"></div>

    <div class="buttons">
        <button class="yes" onclick="showPopup('ha ha nice joke')">Yes</button>
        <button class="no" onclick="showPopup(')')">No</button>
    </div>
</div>

<div id="popup">
    <div id="popup-text"></div>
    <button onclick="closePopup()">Close</button>
</div>

<script>
    // ⭐ Stars
    const starsContainer = document.getElementById("stars");

    function createStar() {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = (Math.random() * 3 + 2) + "s";
        starsContainer.appendChild(star);

        setTimeout(() => star.remove(), 5000);
    }

    setInterval(createStar, 100);

    // ⏱ Timer 1 (с момента)
    const startDate1 = new Date("2026-03-27T01:20:00+03:00");

    function updateTimer1() {
        const now = new Date();
        const diff = now - startDate1;

        const s = Math.floor(diff / 1000) % 60;
        const m = Math.floor(diff / 60000) % 60;
        const h = Math.floor(diff / 3600000) % 24;
        const d = Math.floor(diff / 86400000);

        document.getElementById("timer1").innerText =
            `${d}d ${h}h ${m}m ${s}s`;
    }

    setInterval(updateTimer1, 1000);
    updateTimer1();

    // ⏱ Timer 2 (фиксированный результат)
    const startDate2 = new Date("2026-04-04T02:22:00");
    const endDate2 = new Date("2026-04-14T21:35:00");
    const fixedDiff = endDate2 - startDate2;

    function updateTimer2() {
        const s = Math.floor(fixedDiff / 1000) % 60;
        const m = Math.floor(fixedDiff / 60000) % 60;
        const h = Math.floor(fixedDiff / 3600000) % 24;
        const d = Math.floor(fixedDiff / 86400000);

        document.getElementById("timer2").innerText =
            `${d}d ${h}h ${m}m ${s}s`;
    }

    updateTimer2();

    // 🔥 Popup
    function showPopup(text) {
        document.getElementById("popup-text").innerText = text;
        document.getElementById("popup").style.display = "block";
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    // 🎯 Secret code
    let buffer = "";
    document.addEventListener("keydown", (e) => {
        buffer += e.key.toLowerCase();
        buffer = buffer.slice(-10);

        if (buffer.includes("offer")) {
            showPopup("FINALLY");
            buffer = "";
        }
    });
</script>

</body>
</html>
